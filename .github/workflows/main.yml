on:
  push:
    branches:
      - "main"
  schedule:
    - cron: "3 2 * * TUE,FRI"

# Only run one of these at a time
concurrency:
  group: "main"

jobs:
  main-job:
    name: Load announcements and update game metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache/restore@v5
        with:
          path: |
            announcements/
            games/
            playlists/
            related_playlists/
            games-en-US.json
            last_announcement_check_time.txt
            last_games_list_load_time-en-US.txt
          key: the-cache-but-we-dont-know-the-timestamp-to-use-so-always-use-restore-keys
          restore-keys: |
            the-cache-
      - run: 'du -sh *'
      - run: './main.py'
      - run: 'git diff'
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automatic update"
          git push
      - run: 'du -sh *'
      - uses: actions/cache/save@v5
        with:
          path: |
            announcements/
            games/
            playlists/
            related_playlists/
            games-en-US.json
            last_announcement_check_time.txt
            last_games_list_load_time-en-US.txt
          key: "the-cache-${{ hashFiles('last_games_list_load_time-en-US.txt') }}"
